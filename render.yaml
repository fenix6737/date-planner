# Render Blueprint: https://render.com/docs/blueprint-spec
# Repo default branch is master
databases:
  - name: dateplanner-db
    plan: free
    databaseName: dateplanner
    user: dateplanner

services:
  - type: web
    name: dateplanner-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dateplanner-db
          property: connectionString
      - key: HOTPEPPER_API_KEY
        sync: false
      - key: YAHOO_APP_ID
        sync: false
      - key: MOCK_MODE
        value: "false"
      - key: CORS_ORIGINS
        value: https://dateplanner-web.onrender.com,http://localhost:3000

  - type: web
    name: dateplanner-web
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: ""
      - key: API_PROXY_URL
        value: https://dateplanner-api.onrender.com
